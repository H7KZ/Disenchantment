# ↓ DO NOT EDIT THESE VALUES ↓
migration: 11
locales: [ "cs", "en" ]
# ↑ DO NOT EDIT THESE VALUES ↑
# ----------------------------------------------------------------------------------------
# For descriptions of each option, see the wiki:
# https://github.com/H7KZ/Disenchantment/CONFIG.md
# ----------------------------------------------------------------------------------------

enabled: true

locale: "en"

event-priorities:
  disenchant-click: HIGHEST
  disenchant: HIGHEST
  shatter-click: HIGHEST
  shatter: HIGHEST

# ----------------------------------------------------------------------------------------

logging:
  # NONE = silent | INFO = startup summary | DEBUG = full operation tracing (NMS, adapters, economy, event flow)
  # Set to DEBUG when reporting issues — logs [DEBUG][CATEGORY] lines to the console for every anvil interaction.
  level: INFO
  save-reports: true
  # Set to true to record every disenchant/shatter to plugins/Disenchantment/stats.db
  operations: false
  # Discord webhook URL — if set, crash reports are POSTed asynchronously. Leave empty to disable.
  discord-webhook: ""

# ----------------------------------------------------------------------------------------

disenchantment:
  enabled: true
  disabled-worlds: [ ]
  disabled-materials: [ ]
  enchantments-states: [ ]
  enchantment-chances: { }
  cost-multiplier:
    # When true, the player's effective LuckPerms meta value "disenchantment_multiplier"
    # is used as the XP cost multiplier. Falls back to disenchantment.discount.N permission
    # nodes (N = 5, 10, ..., 95) when LuckPerms is absent, disabled, or has no meta set.
    luckperms: false
  cooldown:
    # Minimum seconds a player must wait between any disenchant/shatter operation. 0 = disabled.
    seconds: 0
    # Delegate cooldown tracking to CMI (if installed). Takes priority over use-essentials.
    use-cmi: false
    # Delegate cooldown tracking to EssentialsX (if installed).
    use-essentials: false
  anvil:
    sound:
      enabled: true
      volume: 1.0
      pitch: 1.0
    repair:
      reset: false
      cost: true
      base: 10
      multiply: 0.25
      enchantment-costs: { }
      max-cost: -1
    # When true, an XP cost >= 40 no longer shows the vanilla "Too Expensive!" screen —
    # the real cost is still charged when the player takes the result.
    bypass-too-expensive: false
  economy:
    enabled: false
    cost: 100.0
    show-cost: true
    charge-message: true

# ----------------------------------------------------------------------------------------

# Named groups of enchantment keys shared by disenchantment and shatterment. A group name may
# be used in place of an enchantment key with the enchantments commands to apply a state to
# every enchantment in the group at once, e.g. "/disenchantment disenchant:enchantments combat disable".
enchantment-groups: { }
#  combat: [ sharpness, smite, bane_of_arthropods ]
#  utility: [ efficiency, unbreaking ]

# ----------------------------------------------------------------------------------------

shatterment:
  enabled: true
  disabled-worlds: [ ]
  disabled-materials: [ ]
  enchantments-states: [ ]
  enchantment-chances: { }
  split-count: 1
  anvil:
    sound:
      enabled: true
      volume: 1.0
      pitch: 1.0
    repair:
      reset: false
      cost: true
      base: 10
      multiply: 0.25
      enchantment-costs: { }
      max-cost: -1
    # When true, an XP cost >= 40 no longer shows the vanilla "Too Expensive!" screen —
    # the real cost is still charged when the player takes the result.
    bypass-too-expensive: false
  economy:
    enabled: false
    cost: 100.0
    show-cost: true
    charge-message: true
