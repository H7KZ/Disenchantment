name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # Checkout

      - name: Checkout
        uses: actions/checkout@v4

      # Java

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Version
      # Strips the leading 'v' from the tag (v6.3.5 -> 6.3.5)

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Maven cache
      # Key encodes the Spigot NMS versions so a cache built without the right
      # artifacts is not silently reused. Bump the spigot-vX suffix whenever
      # the set of required Spigot versions changes.

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-spigot-v1-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-spigot-v1-

      # Spigot BuildTools
      # Checks whether all required remapped NMS JARs are already in the local
      # Maven repo (from cache). Only runs BuildTools when they are missing.
      #
      # Required versions:
      #   1.18      -> v1_18_R1
      #   1.20.6    -> v1_20_R4
      #   1.21.1    -> v1_21_R1, v1_21_R4
      #   1.21.8    -> v1_21_R5

      - name: Check Spigot NMS artifacts
        id: spigot
        run: |
          M2="$HOME/.m2/repository/org/spigotmc/spigot"
          check() { [ -f "$M2/$1/spigot-$1-remapped-mojang.jar" ]; }
          if check "1.18-R0.1-SNAPSHOT" && \
             check "1.20.6-R0.1-SNAPSHOT" && \
             check "1.21.1-R0.1-SNAPSHOT" && \
             check "1.21.8-R0.1-SNAPSHOT"; then
            echo "cached=true" >> $GITHUB_OUTPUT
          else
            echo "cached=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Spigot BuildTools
        if: steps.spigot.outputs.cached == 'false'
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "CI"
          git config --global --add safe.directory '*'

          mkdir -p buildtools && cd buildtools
          wget -q -O BuildTools.jar \
            https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar

          for REV in 1.18 1.20.6 1.21.1 1.21.8; do
            echo "::group::BuildTools $REV"
            java -jar BuildTools.jar --rev "$REV" --remapped
            echo "::endgroup::"
          done

          # Clean up build artifacts to free disk space (Maven repo is kept)
          cd .. && rm -rf buildtools

      # Build
      # Passes the tag version as the Maven revision so the output JAR is named
      # Disenchantment-<version>.jar regardless of what's in pom.xml.

      - name: Build
        run: mvn clean package -B -Drevision=${{ steps.version.outputs.VERSION }}

      - name: Locate JAR
        id: jar
        run: echo "PATH=target/Disenchantment-${{ steps.version.outputs.VERSION }}.jar" >> $GITHUB_OUTPUT

      # GitHub Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.PATH }}
          generate_release_notes: true

      # Modrinth & CurseForge
      # Requires repository secrets:  MODRINTH_TOKEN, CURSEFORGE_TOKEN
      # Requires repository variables: MODRINTH_PROJECT_ID, CURSEFORGE_PROJECT_ID
      #
      # Remove the modrinth-* or curseforge-* lines if you are not on that platform.
      # Adjust game-versions to match the versions your release actually supports.

      - name: Publish to Modrinth & CurseForge
        uses: Kira-NT/mc-publish@v3
        if: ${{ secrets.MODRINTH_TOKEN != '' || secrets.CURSEFORGE_TOKEN != '' }}
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          # Disable the built-in GitHub publishing (we handle it above)
          github-token: ""
          files: ${{ steps.jar.outputs.PATH }}
          name: "Disenchantment ${{ steps.version.outputs.VERSION }}"
          version: ${{ steps.version.outputs.VERSION }}
          loaders: |
            paper
            spigot
            folia
          game-versions: |
            1.18.x
            1.19.x
            1.20.x
            1.21.x

      # Hangar (PaperMC)
      # Requires repository secret:   HANGAR_API_KEY
      #   -> hangar.papermc.io -> Settings -> API Keys -> create_version permission
      #
      # Edit HANGAR_AUTHOR and HANGAR_SLUG below to match your project.
      # Edit platformVersions to list the exact MC versions shown on Hangar
      # (e.g. "1.18", "1.18.1", "1.18.2", ... "1.21.4", "1.21.5").

      - name: Publish to Hangar
        if: ${{ secrets.HANGAR_API_KEY != '' }}
        env:
          HANGAR_API_KEY: ${{ secrets.HANGAR_API_KEY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          JAR: ${{ steps.jar.outputs.PATH }}
          HANGAR_AUTHOR: H7KZ
          HANGAR_SLUG: Disenchantment
        run: |
          JWT=$(curl -sf -X POST \
            "https://hangar.papermc.io/api/v1/authenticate?apiKey=${HANGAR_API_KEY}" \
            -H "accept: application/json" | jq -r '.token')

          METADATA=$(jq -n \
            --arg version "$VERSION" \
            '{
              version: $version,
              channel: "Release",
              description: "See the GitHub release for the full changelog.",
              platforms: [
                {
                  platform: "PAPER",
                  platformVersions: [
                    "1.18","1.18.1","1.18.2",
                    "1.19","1.19.1","1.19.2","1.19.3","1.19.4",
                    "1.20","1.20.1","1.20.2","1.20.3","1.20.4","1.20.5","1.20.6",
                    "1.21","1.21.1","1.21.2","1.21.3","1.21.4","1.21.5","1.21.6","1.21.7","1.21.8", "1.21.9", "1.21.10", "1.21.11"
                  ],
                  url: null
                }
              ]
            }')

          curl -sf -X POST \
            "https://hangar.papermc.io/api/v1/projects/${HANGAR_AUTHOR}/${HANGAR_SLUG}/upload" \
            -H "Authorization: ${JWT}" \
            -F "versionUpload=${METADATA};type=application/json" \
            -F "files[]=@${JAR};type=application/java-archive"

      # Polymart
      # Requires repository secret:   POLYMART_TOKEN
      #   -> polymart.org -> Account Settings -> API Key
      # Requires repository variable: POLYMART_RESOURCE_ID
      #   -> the numeric ID in your resource's URL

      - name: Publish to Polymart
        if: ${{ secrets.POLYMART_TOKEN != '' }}
        env:
          POLYMART_TOKEN: ${{ secrets.POLYMART_TOKEN }}
          POLYMART_RESOURCE_ID: ${{ vars.POLYMART_RESOURCE_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          JAR: ${{ steps.jar.outputs.PATH }}
        run: |
          curl -sf -X POST "https://api.polymart.org/v1/postUpdate" \
            -F "api_token=${POLYMART_TOKEN}" \
            -F "resource_id=${POLYMART_RESOURCE_ID}" \
            -F "title=v${VERSION}" \
            -F "file=@${JAR}"
