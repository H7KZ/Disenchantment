name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Strips the leading 'v' from the tag (v6.3.5 -> 6.3.5).
      # Passed to Maven via -Drevision so the JAR name always matches the tag.
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # The cache key encodes the Spigot versions required by the NMS modules.
      # Bump the spigot-vX suffix whenever the set of Spigot versions changes.
      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-spigot-v1-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-spigot-v1-

      # Checks whether the remapped NMS JARs are already in the Maven cache.
      # Only runs BuildTools when they are missing.
      #
      # Version -> NMS module:
      #   1.18    -> v1_18_R1
      #   1.20.6  -> v1_20_R4
      #   1.21.1  -> v1_21_R1, v1_21_R4
      #   1.21.8  -> v1_21_R5
      - name: Check Spigot NMS artifacts
        id: spigot
        run: |
          M2="$HOME/.m2/repository/org/spigotmc/spigot"
          check() { [ -f "$M2/$1/spigot-$1-remapped-mojang.jar" ]; }
          if check "1.18-R0.1-SNAPSHOT" && \
             check "1.20.6-R0.1-SNAPSHOT" && \
             check "1.21.1-R0.1-SNAPSHOT" && \
             check "1.21.8-R0.1-SNAPSHOT"; then
            echo "cached=true" >> $GITHUB_OUTPUT
          else
            echo "cached=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Spigot BuildTools
        if: steps.spigot.outputs.cached == 'false'
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "CI"
          git config --global --add safe.directory '*'

          mkdir -p buildtools && cd buildtools
          wget -q -O BuildTools.jar \
            https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar

          for REV in 1.18 1.20.6 1.21.1 1.21.8; do
            echo "::group::BuildTools $REV"
            java -jar BuildTools.jar --rev "$REV" --remapped
            echo "::endgroup::"
          done

          # Remove build artifacts to free disk space; the Maven repo is kept
          cd .. && rm -rf buildtools

      - name: Build
        run: mvn clean package -B -Drevision=${{ steps.version.outputs.VERSION }}

      - name: Locate JAR
        id: jar
        run: echo "JAR_FILE=target/Disenchantment-${{ steps.version.outputs.VERSION }}.jar" >> $GITHUB_OUTPUT

      # Creates a GitHub release from the tag and attaches the JAR.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.JAR_FILE }}
          generate_release_notes: true

      # Publishes to Modrinth and/or CurseForge.
      # Required secrets:   MODRINTH_TOKEN, CURSEFORGE_TOKEN
      # Required secrets:   MODRINTH_PROJECT_ID, CURSEFORGE_PROJECT_ID
      # Remove the modrinth-* or curseforge-* lines for platforms you don't use.
      # github-token is omitted so mc-publish skips GitHub (handled above).
      - name: Publish to Modrinth & CurseForge
        uses: Kira-NT/mc-publish@v3
        if: ${{ secrets.MODRINTH_TOKEN != '' || secrets.CURSEFORGE_TOKEN != '' }}
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.jar.outputs.JAR_FILE }}
          name: "Disenchantment ${{ steps.version.outputs.VERSION }}"
          version: ${{ steps.version.outputs.VERSION }}
          loaders: |
            paper
            spigot
            folia
          game-versions: |
            1.18.x
            1.19.x
            1.20.x
            1.21.x

      # Publishes to Hangar (PaperMC's plugin repository).
      # Required secret:   HANGAR_API_KEY
      #   -> hangar.papermc.io -> Settings -> API Keys -> tick create_version
      # Required secrets:  HANGAR_AUTHOR (your username), HANGAR_SLUG (project slug)
      # platformVersions must list exact version strings recognised by Hangar.
      - name: Publish to Hangar
        if: ${{ secrets.HANGAR_API_KEY != '' }}
        env:
          HANGAR_API_KEY: ${{ secrets.HANGAR_API_KEY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          JAR_FILE: ${{ steps.jar.outputs.JAR_FILE }}
          HANGAR_AUTHOR: ${{ secrets.HANGAR_AUTHOR }}
          HANGAR_SLUG: ${{ secrets.HANGAR_SLUG }}
        run: |
          JWT=$(curl -sf -X POST \
            "https://hangar.papermc.io/api/v1/authenticate?apiKey=${HANGAR_API_KEY}" \
            -H "accept: application/json" | jq -r '.token')

          METADATA=$(jq -n \
            --arg version "$VERSION" \
            '{
              version: $version,
              channel: "Release",
              description: "See the GitHub release for the full changelog.",
              platforms: [
                {
                  platform: "PAPER",
                  platformVersions: [
                    "1.18","1.18.1","1.18.2",
                    "1.19","1.19.1","1.19.2","1.19.3","1.19.4",
                    "1.20","1.20.1","1.20.2","1.20.3","1.20.4","1.20.5","1.20.6",
                    "1.21","1.21.1","1.21.2","1.21.3","1.21.4",
                    "1.21.5","1.21.6","1.21.7","1.21.8","1.21.9","1.21.10","1.21.11"
                  ],
                  url: null
                }
              ]
            }')

          curl -sf -X POST \
            "https://hangar.papermc.io/api/v1/projects/${HANGAR_AUTHOR}/${HANGAR_SLUG}/upload" \
            -H "Authorization: ${JWT}" \
            -F "versionUpload=${METADATA};type=application/json" \
            -F "files[]=@${JAR_FILE};type=application/java-archive"

      # Publishes to Polymart.
      # Required secret:   POLYMART_TOKEN
      #   -> polymart.org -> Account Settings -> API Key
      # Required secret:   POLYMART_RESOURCE_ID (numeric ID from the resource URL)
      - name: Publish to Polymart
        if: ${{ secrets.POLYMART_TOKEN != '' }}
        env:
          POLYMART_TOKEN: ${{ secrets.POLYMART_TOKEN }}
          POLYMART_RESOURCE_ID: ${{ secrets.POLYMART_RESOURCE_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          JAR_FILE: ${{ steps.jar.outputs.JAR_FILE }}
        run: |
          curl -sf -X POST "https://api.polymart.org/v1/postUpdate" \
            -F "api_token=${POLYMART_TOKEN}" \
            -F "resource_id=${POLYMART_RESOURCE_ID}" \
            -F "title=v${VERSION}" \
            -F "file=@${JAR_FILE};type=application/java-archive"
