name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v6.3.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Edit these when adding support for new Minecraft versions.
      # Exact version strings used by all platforms (Modrinth, CurseForge, Hangar, Polymart).
      # If Hangar rejects a version with 400/500, it may not be registered yet — remove it.
      GAME_VERSIONS: >-
        1.18 1.18.1 1.18.2
        1.19 1.19.1 1.19.2 1.19.3 1.19.4
        1.20 1.20.1 1.20.2 1.20.3 1.20.4 1.20.5 1.20.6
        1.21 1.21.1 1.21.2 1.21.3 1.21.4 1.21.5 1.21.6 1.21.7 1.21.8 1.21.9 1.21.10 1.21.11
      # Loaders for Modrinth and CurseForge.
      LOADERS: paper spigot folia

      HAS_MODRINTH: ${{ secrets.MODRINTH_TOKEN != '' }}
      HAS_CURSEFORGE: ${{ secrets.CURSEFORGE_TOKEN != '' }}
      HAS_HANGAR: ${{ secrets.HANGAR_API_KEY != '' }}
      HAS_POLYMART: ${{ secrets.POLYMART_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Both versions are needed for BuildTools: 1.18 requires Java 17,
      # 1.20.6+ requires Java 21. The last setup call sets the default,
      # so Java 21 is used for the Maven build.
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Strips the leading 'v' from the tag (e.g. v6.3.5 -> 6.3.5).
      # On manual runs, uses the tag input instead of GITHUB_REF_NAME.
      # Passed to Maven via -Drevision so the JAR name always matches the tag.
      - name: Extract version from tag
        id: version
        run: |
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${RAW#v}" >> $GITHUB_OUTPUT

      # The cache key encodes the Spigot versions required by the NMS modules.
      # Bump the spigot-vX suffix whenever the set of Spigot versions changes.
      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-spigot-v1-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-spigot-v1-

      # Checks whether the remapped NMS JARs are already in the Maven cache.
      # Only runs BuildTools when they are missing.
      #
      # Version -> NMS module:
      #   1.18    -> v1_18_R1
      #   1.20.6  -> v1_20_R4
      #   1.21.1  -> v1_21_R1, v1_21_R4
      #   1.21.8  -> v1_21_R5
      - name: Check Spigot NMS artifacts
        id: spigot
        run: |
          M2="$HOME/.m2/repository/org/spigotmc/spigot"
          check() { [ -f "$M2/$1/spigot-$1-remapped-mojang.jar" ]; }
          if check "1.18-R0.1-SNAPSHOT" && \
             check "1.20.6-R0.1-SNAPSHOT" && \
             check "1.21.1-R0.1-SNAPSHOT" && \
             check "1.21.8-R0.1-SNAPSHOT"; then
            echo "cached=true" >> $GITHUB_OUTPUT
          else
            echo "cached=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Spigot BuildTools
        if: steps.spigot.outputs.cached == 'false'
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "CI"
          git config --global --add safe.directory '*'

          mkdir -p buildtools && cd buildtools
          wget -q -O BuildTools.jar \
            https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar

          for REV in 1.18 1.20.6 1.21.1 1.21.8; do
            echo "::group::BuildTools $REV"
            case "$REV" in
              1.18) JAVA_BIN="$JAVA_HOME_17_X64/bin/java" ;;
              *)    JAVA_BIN="$JAVA_HOME_21_X64/bin/java" ;;
            esac
            "$JAVA_BIN" -jar BuildTools.jar --rev "$REV" --remapped
            echo "::endgroup::"
          done

          cd .. && rm -rf buildtools

      - name: Build
        run: mvn clean package -B -Drevision=${{ steps.version.outputs.VERSION }}

      - name: Locate JAR
        id: jar
        run: echo "JAR_FILE=target/Disenchantment-${{ steps.version.outputs.VERSION }}.jar" >> $GITHUB_OUTPUT

      # Check if the GitHub release already exists. If it does, all publishing is skipped —
      # GitHub is the source of truth. Re-running the workflow won't duplicate anything.
      - name: Check GitHub release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}")
          [ "$STATUS" = "200" ] && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      # tag_name is set explicitly so workflow_dispatch (branch ref) works too.
      - name: Create GitHub Release
        if: steps.check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: ${{ steps.jar.outputs.JAR_FILE }}
          generate_release_notes: true

      # Builds a comma-separated list of platforms that have credentials configured.
      # MCReleaser skips any platform not in this list.
      - name: Compute active platforms
        if: steps.check.outputs.exists != 'true'
        id: platforms
        run: |
          PLATFORMS=""
          [ "$HAS_MODRINTH"   = "true" ] && PLATFORMS="${PLATFORMS:+$PLATFORMS,}modrinth"
          [ "$HAS_CURSEFORGE" = "true" ] && PLATFORMS="${PLATFORMS:+$PLATFORMS,}curseforge"
          [ "$HAS_HANGAR"     = "true" ] && PLATFORMS="${PLATFORMS:+$PLATFORMS,}hangar"
          [ "$HAS_POLYMART"   = "true" ] && PLATFORMS="${PLATFORMS:+$PLATFORMS,}polymart"
          echo "list=$PLATFORMS" >> $GITHUB_OUTPUT

      - name: Publish to platforms
        if: steps.check.outputs.exists != 'true' && steps.platforms.outputs.list != ''
        uses: HSGamer/MCReleaser@master
        with:
          files: ${{ steps.jar.outputs.JAR_FILE }}
          platforms: ${{ steps.platforms.outputs.list }}
        env:
          NAME: Disenchantment
          VERSION: ${{ steps.version.outputs.VERSION }}
          DESCRIPTION: "See the GitHub release for the full changelog. https://github.com/H7KZ/Disenchantment/releases"
          GAME_VERSIONS: ${{ env.GAME_VERSIONS }}

          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT: ${{ secrets.MODRINTH_PROJECT_ID }}
          MODRINTH_LOADERS: ${{ env.LOADERS }}

          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          CURSEFORGE_MOD_LOADERS: ${{ env.LOADERS }}

          HANGAR_KEY: ${{ secrets.HANGAR_API_KEY }}
          HANGAR_PROJECT: ${{ secrets.HANGAR_SLUG }}
          HANGAR_CHANNEL: Release

          POLYMART_KEY: ${{ secrets.POLYMART_TOKEN }}
          POLYMART_RESOURCE: ${{ secrets.POLYMART_RESOURCE_ID }}
