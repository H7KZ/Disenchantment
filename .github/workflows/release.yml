name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v6.3.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Edit these when adding support for new Minecraft versions.
      # Glob patterns used by mc-publish (Modrinth, CurseForge).
      GAME_VERSIONS: |
        1.18.x
        1.19.x
        1.20.x
        1.21.x
      # Loaders for Modrinth and CurseForge.
      LOADERS: |
        paper
        spigot
        folia
      # Exact version strings for Hangar (space-separated).
      # Every entry must be registered in Hangar's version registry.
      # If the upload fails with a 400/500, a new MC version may not be in
      # Hangar yet — remove the offending string until Hangar adds it.
      HANGAR_VERSIONS: >-
        1.18 1.18.1 1.18.2
        1.19 1.19.1 1.19.2 1.19.3 1.19.4
        1.20 1.20.1 1.20.2 1.20.3 1.20.4 1.20.5 1.20.6
        1.21 1.21.1 1.21.2 1.21.3 1.21.4 1.21.5 1.21.6 1.21.7 1.21.8 1.21.9 1.21.10 1.21.11


      HAS_MODRINTH: ${{ secrets.MODRINTH_TOKEN != '' }}
      HAS_CURSEFORGE: ${{ secrets.CURSEFORGE_TOKEN != '' }}
      HAS_HANGAR: ${{ secrets.HANGAR_API_KEY != '' }}
      HAS_POLYMART: ${{ secrets.POLYMART_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Both versions are needed for BuildTools: 1.18 requires Java 17,
      # 1.20.6+ requires Java 21. The last setup call sets the default,
      # so Java 21 is used for the Maven build.
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # Strips the leading 'v' from the tag (v6.3.5 -> 6.3.5).
      # On manual runs, uses the tag input instead of GITHUB_REF_NAME.
      # Passed to Maven via -Drevision so the JAR name always matches the tag.
      - name: Extract version from tag
        id: version
        run: |
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${RAW#v}" >> $GITHUB_OUTPUT

      # The cache key encodes the Spigot versions required by the NMS modules.
      # Bump the spigot-vX suffix whenever the set of Spigot versions changes.
      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-spigot-v1-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-spigot-v1-

      # Checks whether the remapped NMS JARs are already in the Maven cache.
      # Only runs BuildTools when they are missing.
      #
      # Version -> NMS module:
      #   1.18    -> v1_18_R1
      #   1.20.6  -> v1_20_R4
      #   1.21.1  -> v1_21_R1, v1_21_R4
      #   1.21.8  -> v1_21_R5
      - name: Check Spigot NMS artifacts
        id: spigot
        run: |
          M2="$HOME/.m2/repository/org/spigotmc/spigot"
          check() { [ -f "$M2/$1/spigot-$1-remapped-mojang.jar" ]; }
          if check "1.18-R0.1-SNAPSHOT" && \
             check "1.20.6-R0.1-SNAPSHOT" && \
             check "1.21.1-R0.1-SNAPSHOT" && \
             check "1.21.8-R0.1-SNAPSHOT"; then
            echo "cached=true" >> $GITHUB_OUTPUT
          else
            echo "cached=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Spigot BuildTools
        if: steps.spigot.outputs.cached == 'false'
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "CI"
          git config --global --add safe.directory '*'

          mkdir -p buildtools && cd buildtools
          wget -q -O BuildTools.jar \
            https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar

          for REV in 1.18 1.20.6 1.21.1 1.21.8; do
            echo "::group::BuildTools $REV"
            case "$REV" in
              1.18) JAVA_BIN="$JAVA_HOME_17_X64/bin/java" ;;
              *)    JAVA_BIN="$JAVA_HOME_21_X64/bin/java" ;;
            esac
            "$JAVA_BIN" -jar BuildTools.jar --rev "$REV" --remapped
            echo "::endgroup::"
          done

          cd .. && rm -rf buildtools

      - name: Build
        run: mvn clean package -B -Drevision=${{ steps.version.outputs.VERSION }}

      - name: Locate JAR
        id: jar
        run: echo "JAR_FILE=target/Disenchantment-${{ steps.version.outputs.VERSION }}.jar" >> $GITHUB_OUTPUT

      # Queries each platform's API to check whether this version is already
      # published. Sets boolean outputs (github, modrinth, curseforge, hangar,
      # polymart) — publishing steps skip when the output is 'true'.
      - name: Check already-published versions
        id: check
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          HANGAR_API_KEY: ${{ secrets.HANGAR_API_KEY }}
          HANGAR_AUTHOR: ${{ secrets.HANGAR_AUTHOR }}
          HANGAR_SLUG: ${{ secrets.HANGAR_SLUG }}
          POLYMART_TOKEN: ${{ secrets.POLYMART_TOKEN }}
          POLYMART_RESOURCE_ID: ${{ secrets.POLYMART_RESOURCE_ID }}
        run: |
          exists() {
            local PLATFORM="$1" FLAG="$2"
            echo "${PLATFORM}: v${VERSION} already published, skipping."
            echo "${FLAG}=true" >> $GITHUB_OUTPUT
          }
          skip() { echo "$1=false" >> $GITHUB_OUTPUT; }

          # GitHub Release
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${GH_REPO}/releases/tags/v${VERSION}")
          [ "$STATUS" = "200" ] && exists "GitHub" "github" || skip "github"

          # Modrinth - public API, no auth required.
          # GET /v2/project/{id}/version?version_number[]={v} returns matching versions.
          if [ -n "$MODRINTH_PROJECT_ID" ]; then
            COUNT=$(curl -s \
              "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}/version?version_number[]=${VERSION}" \
              | jq 'length')
            [ "$COUNT" -gt 0 ] && exists "Modrinth" "modrinth" || skip "modrinth"
          else
            skip "modrinth"
          fi

          # CurseForge - checks displayName of uploaded files for the version string.
          # GET /v1/mods/{id}/files returns up to 50 recent files with displayName.
          if [ -n "$CURSEFORGE_TOKEN" ] && [ -n "$CURSEFORGE_PROJECT_ID" ]; then
            EXISTS=$(curl -s \
              -H "x-api-key: ${CURSEFORGE_TOKEN}" \
              "https://api.curseforge.com/v1/mods/${CURSEFORGE_PROJECT_ID}/files?pageSize=50" \
              | jq --arg v "$VERSION" '[.data[].displayName | contains($v)] | any')
            [ "$EXISTS" = "true" ] && exists "CurseForge" "curseforge" || skip "curseforge"
          else
            skip "curseforge"
          fi

          # Hangar - GET .../versions/{version} returns 200 if it exists, 404 if not.
          # Auth header must be "Authorization: HangarAuth <jwt>".
          if [ -n "$HANGAR_API_KEY" ]; then
            JWT=$(curl -s -X POST \
              "https://hangar.papermc.io/api/v1/authenticate?apiKey=${HANGAR_API_KEY}" \
              -H "accept: application/json" | jq -r '.token // empty')
            if [ -n "$JWT" ]; then
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: HangarAuth ${JWT}" \
                "https://hangar.papermc.io/api/v1/projects/${HANGAR_AUTHOR}/${HANGAR_SLUG}/versions/${VERSION}")
              [ "$STATUS" = "200" ] && exists "Hangar" "hangar" || skip "hangar"
            else
              skip "hangar"
            fi
          else
            skip "hangar"
          fi

          # Polymart - GET /v1/getResourceUpdates returns update history.
          # Match on .response.updates[].version (bare version string, e.g. "6.3.5").
          if [ -n "$POLYMART_TOKEN" ] && [ -n "$POLYMART_RESOURCE_ID" ]; then
            EXISTS=$(curl -s \
              "https://api.polymart.org/v1/getResourceUpdates?resource_id=${POLYMART_RESOURCE_ID}&api_key=${POLYMART_TOKEN}" \
              | jq --arg v "$VERSION" '[.response.updates[]?.version == $v] | any')
            [ "$EXISTS" = "true" ] && exists "Polymart" "polymart" || skip "polymart"
          else
            skip "polymart"
          fi

      # tag_name is set explicitly so workflow_dispatch (branch ref) works too.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.check.outputs.github != 'true'
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: ${{ steps.jar.outputs.JAR_FILE }}
          generate_release_notes: true

      # Required secrets: MODRINTH_TOKEN, MODRINTH_PROJECT_ID
      - name: Publish to Modrinth
        uses: Kira-NT/mc-publish@v3
        if: env.HAS_MODRINTH == 'true' && steps.check.outputs.modrinth != 'true'
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.jar.outputs.JAR_FILE }}
          name: "Disenchantment ${{ steps.version.outputs.VERSION }}"
          version: ${{ steps.version.outputs.VERSION }}
          loaders: ${{ env.LOADERS }}
          game-versions: ${{ env.GAME_VERSIONS }}

      # Required secrets: CURSEFORGE_TOKEN, CURSEFORGE_PROJECT_ID
      - name: Publish to CurseForge
        uses: Kira-NT/mc-publish@v3
        if: env.HAS_CURSEFORGE == 'true' && steps.check.outputs.curseforge != 'true'
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.jar.outputs.JAR_FILE }}
          name: "Disenchantment ${{ steps.version.outputs.VERSION }}"
          version: ${{ steps.version.outputs.VERSION }}
          loaders: ${{ env.LOADERS }}
          game-versions: ${{ env.GAME_VERSIONS }}

      # Required secrets: HANGAR_API_KEY, HANGAR_AUTHOR, HANGAR_SLUG
      #   HANGAR_API_KEY -> hangar.papermc.io -> Settings -> API Keys -> create_version
      - name: Publish to Hangar
        if: env.HAS_HANGAR == 'true' && steps.check.outputs.hangar != 'true'
        env:
          HANGAR_API_KEY: ${{ secrets.HANGAR_API_KEY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          JAR_FILE: ${{ steps.jar.outputs.JAR_FILE }}
          HANGAR_AUTHOR: ${{ secrets.HANGAR_AUTHOR }}
          HANGAR_SLUG: ${{ secrets.HANGAR_SLUG }}
        run: |
          AUTH_RESPONSE=$(curl -s -X POST \
            "https://hangar.papermc.io/api/v1/authenticate?apiKey=${HANGAR_API_KEY}" \
            -H "accept: application/json")
          JWT=$(echo "$AUTH_RESPONSE" | jq -r '.token')

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "Hangar authentication failed: $AUTH_RESPONSE"
            exit 1
          fi

          # Convert the space-separated HANGAR_VERSIONS env var to a JSON array.
          VERSIONS_JSON=$(echo "$HANGAR_VERSIONS" | tr -s ' \n' '\n' | grep -v '^$' | jq -R . | jq -s .)

          # versionUpload schema: platformDependencies (map of platform -> version list)
          # and files (list of objects declaring which platforms each binary supports).
          METADATA=$(jq -n \
            --arg version "$VERSION" \
            --argjson platforms "$VERSIONS_JSON" \
            '{
              version: $version,
              channel: "Release",
              description: "See the GitHub release for the full changelog.",
              platformDependencies: { PAPER: $platforms },
              files: [{ platforms: ["PAPER"] }]
            }')

          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://hangar.papermc.io/api/v1/projects/${HANGAR_AUTHOR}/${HANGAR_SLUG}/upload" \
            -H "Authorization: HangarAuth ${JWT}" \
            -F "versionUpload=${METADATA};type=application/json" \
            -F "files=@${JAR_FILE};type=application/java-archive")

          HTTP_STATUS=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Hangar upload failed: $BODY"
            exit 1
          fi

      # Required secrets: POLYMART_TOKEN, POLYMART_RESOURCE_ID
      #   POLYMART_TOKEN -> polymart.org -> Account Settings -> API Key (Post Updates permission)
      #   POLYMART_RESOURCE_ID -> numeric ID from your resource's URL
      - name: Publish to Polymart
        if: env.HAS_POLYMART == 'true' && steps.check.outputs.polymart != 'true'
        env:
          POLYMART_TOKEN: ${{ secrets.POLYMART_TOKEN }}
          POLYMART_RESOURCE_ID: ${{ secrets.POLYMART_RESOURCE_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          JAR_FILE: ${{ steps.jar.outputs.JAR_FILE }}
        run: |
          curl -sf -X POST "https://api.polymart.org/v1/postUpdate" \
            -F "api_key=${POLYMART_TOKEN}" \
            -F "resource_id=${POLYMART_RESOURCE_ID}" \
            -F "version=${VERSION}" \
            -F "title=v${VERSION}" \
            -F "message=See the GitHub release for the full changelog." \
            -F "file=@${JAR_FILE};type=application/java-archive"
